services:
  mongodb:
    image: mongo:4.4
    container_name: mcp-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mcp_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mcp_secure_password}
    volumes:
      - mongodb_data:/data/db
    networks:
      - mcp-network
    healthcheck:
      # Remplacement de 'mongosh' par 'mongo' pour la version 4.4
      test: ["CMD", "mongo", "--quiet", "--username", "${MONGO_USER:-mcp_user}", "--password", "${MONGO_PASSWORD:-mcp_secure_password}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: "admin"
      ME_CONFIG_BASICAUTH_PASSWORD: "password"
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_USER:-mcp_user}:${MONGO_PASSWORD:-mcp_secure_password}@mongodb:27017/?authSource=admin"
    networks:
      - mcp-network
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local

networks:
  mcp-network:
    driver: bridge