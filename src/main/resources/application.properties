spring.application.name=carburant-station-service

spring.ai.mcp.server.name=carburant-station-service-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mcp_db}
spring.datasource.username=${DB_USER:mcp_user}
spring.datasource.password=${DB_PASSWORD:un_mot_de_passe_tres_securise}
spring.datasource.driver-class-name=org.postgresql.Driver
# Optionnel : Configuration JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=carburant_service
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${SERVER_PORT:8080}